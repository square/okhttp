name: containers

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, labeled, unlabeled, synchronize]

permissions:
  contents: read

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dkotlin.incremental=false"

jobs:
  test_containers:
    permissions:
      checks: write # for actions/upload-artifact
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || contains(github.event.pull_request.labels.*.name, 'containers')

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run Container Tests
        run: ./gradlew container-tests:test -PcontainerTests=true

      # The run above uses JDK 21 + SunJSSE, where the post-quantum tests skip (no PQC provider).
      # Re-run just those with the Conscrypt platform so X25519MLKEM768 is actually negotiated.
      # continue-on-error because it depends on a pre-release Conscrypt (2.6-alpha).
      - name: Run Post-Quantum Container Tests (Conscrypt)
        continue-on-error: true
        run: >
          ./gradlew container-tests:test -PcontainerTests=true
          -Pokhttp.platform=conscrypt
          --tests "okhttp3.containers.PostQuantum*"
